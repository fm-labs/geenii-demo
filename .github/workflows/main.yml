on: [push]

jobs:
  hello_world_job:
    runs-on: ubuntu-latest
    name: A job to say hello
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Hello world action step
        uses: ./ # action.yml in the root directory
        id: hello
        with:
          prompt: 'Who are you?'

