name: 'Geenii Action'
description: 'Runs a geenii agent'
author: 'fm-labs'

inputs:
  prompt:
    description: 'Override the default prompt'
    required: false
    default: 'Process the next task.'
  model:
    description: 'Override the default model to use'
    required: false
    default: 'openai:gpt-4o-mini'


outputs:
  geenii-output:
    description: 'Output from the geenii agent'
  exit-code:
    description: 'Exit code'

runs:
  using: 'docker'
  image: 'docker://docker.io/fmlabs/geenii:latest'
  env:
    DEFAULT_COMPLETION_MODEL: ${{ inputs.model }}
    GEENII_DIR: '/github/workspace/.geenii'
    GEENII_USER_DIR: '/github/workspace/.geenii'
    GEENII_CI: 'true'
  args:
    - geenii
    - "${{ inputs.prompt }}"

branding:
  icon: 'shield'
  color: 'blue'